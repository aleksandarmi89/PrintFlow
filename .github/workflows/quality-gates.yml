name: Quality Gates

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run focused regression tests (Unix)
        if: runner.os != 'Windows'
        run: >
          ./mvnw -B
          -Dtest=PublicTrackCompanyScopeIntegrationTest,PublicTrackPageIntegrationTest,PublicOrderTokenIntegrationTest,PublicErrorStatusIntegrationTest,PublicUploadReferenceIntegrationTest,PublicMessagesConsistencyTest,MonitoringAssetsSmokeTest,ManagementMetricsIntegrationTest
          test

      - name: Run focused regression tests (Windows)
        if: runner.os == 'Windows'
        run: >
          .\mvnw.cmd -B
          -Dtest=PublicTrackCompanyScopeIntegrationTest,PublicTrackPageIntegrationTest,PublicOrderTokenIntegrationTest,PublicErrorStatusIntegrationTest,PublicUploadReferenceIntegrationTest,PublicMessagesConsistencyTest,MonitoringAssetsSmokeTest,ManagementMetricsIntegrationTest
          test
