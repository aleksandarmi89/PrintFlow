name: Quality Gates

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  regression-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run focused regression tests
        run: >
          ./mvnw -B
          -Dtest=PublicTrackCompanyScopeIntegrationTest,PublicMessagesConsistencyTest,MonitoringAssetsSmokeTest,ManagementMetricsIntegrationTest
          test
