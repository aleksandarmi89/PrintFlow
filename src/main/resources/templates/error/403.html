<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="${errorTitle} + ' - PrintFlow'">Forbidden - PrintFlow</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900" th:text="${errorTitle}">Forbidden</h1>
            <p class="mt-3 text-gray-600" th:if="${errorMessageKey != null and errorMessageArg != null}"
               th:text="#{${errorMessageKey}(${errorMessageArg})}">
                Your trial ended on 2026-02-25. Please upgrade to continue premium features.
            </p>
            <p class="mt-3 text-gray-600" th:if="${errorMessageKey != null and errorMessageArg == null}"
               th:text="#{${errorMessageKey}}">
                Your trial has ended. Please upgrade to continue premium features.
            </p>
            <p class="mt-3 text-gray-600" th:if="${errorMessageKey == null}" th:text="${errorMessage}">
                You do not have permission to access this page.
            </p>
            <p class="mt-4 text-sm text-gray-400"><span th:text="#{common.status}">Status</span> <span th:text="${status}">403</span></p>
            <div class="mt-6 flex justify-center gap-3">
                <a th:href="@{/}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" th:text="#{auth.go_home}">Go Home</a>
                <button type="button" onclick="history.back()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50" th:text="#{common.back}">Back</button>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
