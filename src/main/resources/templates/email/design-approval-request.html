<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Design approval required</title>
</head>
<body>
<th:block th:replace="~{email/base :: layout(
    ${(lang == 'sr' ? 'Potrebno odobrenje dizajna: ' : 'Design approval required: ') + orderNumber},
    ${logoUrl},
    ${logoInline},
    ${companyName},
    ${companyEmail},
    ${companyPhone},
    ${companyWebsite},
    ${companyAddress},
    ~{::content}
)}">
    <th:block th:fragment="content">
        <p th:text="${lang == 'sr' ? 'Zdravo, ' + clientName + '.' : 'Hello, ' + clientName + '.'}">Hello</p>
        <p th:text="${lang == 'sr' ? 'Molimo vas da pregledate i odobrite dizajn kako bi proizvodnja mogla da se nastavi.' : 'Please review and approve the design so production can continue.'}">Please review and approve the design so production can continue.</p>
        <table style="width:100%; border-collapse:collapse; margin:16px 0;">
            <tr><td style="padding:6px 0; color:#6b7280;" th:text="${lang == 'sr' ? 'Broj naloga' : 'Order number'}">Order number</td><td style="padding:6px 0;" th:text="${orderNumber}">ORD-XXXX</td></tr>
            <tr><td style="padding:6px 0; color:#6b7280;" th:text="${lang == 'sr' ? 'Naziv' : 'Title'}">Title</td><td style="padding:6px 0;" th:text="${orderTitle}">Order title</td></tr>
            <tr th:if="${deadline != null}"><td style="padding:6px 0; color:#6b7280;" th:text="${lang == 'sr' ? 'Rok' : 'Deadline'}">Deadline</td><td style="padding:6px 0;" th:text="${#temporals.format(deadline, 'dd.MM.yyyy HH:mm')}">07.03.2026 12:00</td></tr>
        </table>
        <p style="margin:18px 0;">
            <a th:href="${trackingUrl}" style="background:#2563eb;color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;" th:text="${lang == 'sr' ? 'Otvori nalog' : 'Open order'}">Open order</a>
        </p>
        <p style="font-size:12px; color:#6b7280;">
            <span th:text="${lang == 'sr' ? 'Link za praćenje/odobrenje: ' : 'Tracking/approval link: '}">Tracking/approval link: </span>
            <span th:text="${trackingUrl}">https://...</span>
        </p>
    </th:block>
</th:block>
</body>
</html>
