<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{products.sync.settings.title}">Product API Sync Settings</title>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="container mx-auto px-4 py-8 max-w-3xl">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900" th:text="#{products.sync.settings.title}">Product API Sync Settings</h1>
            <p class="text-sm text-gray-600" th:text="#{products.sync.settings.subtitle}">Configure tenant-level external product sync.</p>
        </div>
        <a th:href="@{/products}" class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50" th:text="#{products.import.back}">Back to Products</a>
    </div>

    <div th:if="${successMessage}" class="mb-4 p-3 rounded-lg border border-green-200 bg-green-50 text-green-700" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 p-3 rounded-lg border border-red-200 bg-red-50 text-red-700" th:text="${errorMessage}"></div>

    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <form th:action="@{/products/sync/settings}" th:object="${syncForm}" method="post" class="space-y-4">
            <div th:if="${#fields.hasGlobalErrors()}" class="rounded-lg border border-red-200 bg-red-50 text-red-700 px-3 py-2 text-sm">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">Validation error</p>
            </div>

            <label class="flex items-center gap-2">
                <input type="checkbox" th:field="*{enabled}" class="rounded border-gray-300"/>
                <span class="text-sm font-medium text-gray-700" th:text="#{products.sync.settings.enabled}">Enable API sync</span>
            </label>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.endpoint}">Endpoint URL</label>
                <input type="text" th:field="*{endpointUrl}" class="w-full rounded-lg border border-gray-300 px-3 py-2" placeholder="https://api.example.com/products"/>
                <p class="mt-1 text-xs text-gray-500" th:text="#{products.sync.settings.endpoint_hint}">For demo mode use demo://products</p>
                <button type="button" id="useDemoEndpoint" class="mt-2 text-xs px-2 py-1 rounded border border-gray-300 hover:bg-gray-50"
                        th:text="#{products.sync.settings.use_demo_endpoint}">Use demo endpoint</button>
                <p th:if="${#fields.hasErrors('endpointUrl')}" class="mt-1 text-xs text-red-600" th:errors="*{endpointUrl}"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.auth_type}">Auth type</label>
                    <select th:field="*{authType}" class="w-full rounded-lg border border-gray-300 px-3 py-2">
                        <option th:each="a : ${authTypes}" th:value="${a}" th:text="${a.name()}">NONE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.auth_header}">Auth header</label>
                    <input type="text" th:field="*{authHeaderName}" class="w-full rounded-lg border border-gray-300 px-3 py-2" placeholder="X-API-Key"/>
                    <p th:if="${#fields.hasErrors('authHeaderName')}" class="mt-1 text-xs text-red-600" th:errors="*{authHeaderName}"></p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.auth_token}">Auth token</label>
                <input type="password" th:field="*{authToken}" class="w-full rounded-lg border border-gray-300 px-3 py-2" th:placeholder="#{products.sync.settings.auth_token_placeholder}"/>
                <p class="mt-1 text-xs text-gray-500" th:text="#{products.sync.settings.auth_token_hint}">Leave blank to keep current token.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.payload_root}">Payload root key</label>
                <input type="text" th:field="*{payloadRoot}" class="w-full rounded-lg border border-gray-300 px-3 py-2" placeholder="items"/>
                <p class="mt-1 text-xs text-gray-500" th:text="#{products.sync.settings.payload_root_hint}">Optional. Use when array is nested.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.connect_timeout}">Connect timeout (ms)</label>
                    <input type="number" th:field="*{connectTimeoutMs}" class="w-full rounded-lg border border-gray-300 px-3 py-2"/>
                    <p th:if="${#fields.hasErrors('connectTimeoutMs')}" class="mt-1 text-xs text-red-600" th:errors="*{connectTimeoutMs}"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{products.sync.settings.read_timeout}">Read timeout (ms)</label>
                    <input type="number" th:field="*{readTimeoutMs}" class="w-full rounded-lg border border-gray-300 px-3 py-2"/>
                    <p th:if="${#fields.hasErrors('readTimeoutMs')}" class="mt-1 text-xs text-red-600" th:errors="*{readTimeoutMs}"></p>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700" th:text="#{common.save}">Save</button>
            </div>
        </form>
        <form th:action="@{/products/sync/settings/test}" method="post" class="mt-3">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="px-4 py-2 rounded-lg border border-emerald-300 text-emerald-700 text-sm hover:bg-emerald-50"
                    th:text="#{products.sync.test_connection}">Test connection</button>
            <p class="mt-1 text-xs text-gray-500" th:text="#{products.sync.test_connection_hint}">
                Tests currently saved settings and checks if response contains array payload.
            </p>
        </form>
    </div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const btn = document.getElementById('useDemoEndpoint');
        const input = document.getElementById('endpointUrl');
        if (btn && input) {
            btn.addEventListener('click', function () {
                input.value = 'demo://products';
            });
        }
    });
</script>
</body>
</html>
