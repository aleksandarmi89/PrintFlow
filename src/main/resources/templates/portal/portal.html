<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{portal.title}">Client Portal</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-gray-50">
<div class="max-w-5xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold" th:text="#{portal.title}">Client Portal</h1>
                <p class="text-gray-600" th:text="${client.companyName}">Client</p>
            </div>
            <div class="flex items-center gap-3">
                <img th:if="${companyBrand != null and companyBrand.logoUrl != null}" th:src="${companyBrand.logoUrl}" alt="Logo" class="h-10 w-10 rounded">
                <div th:if="${companyBrand == null || companyBrand.logoUrl == null}" class="h-12 w-auto rounded flex items-center justify-center">
                    <img th:src="@{/images/app-logo.svg}" alt="ProPrintFlow" class="h-20 w-auto object-contain"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                    <div style="display:none" class="h-20 w-20 rounded bg-blue-600 items-center justify-center text-white font-bold">PF</div>
                </div>
                <div class="text-sm text-gray-700" th:text="${companyBrand != null ? companyBrand.name : 'PrintFlow'}">PrintFlow</div>
            </div>
        </div>
    </div>

    <div class="space-y-6">
        <div th:each="order : ${orders}" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold" th:text="${order.title}">Order</h2>
                    <p class="text-sm text-gray-500"><span th:text="#{portal.order_number}">Order #</span><span th:text="${order.orderNumber}"></span></p>
                </div>
                <span class="px-3 py-1 rounded-full text-sm bg-blue-50 text-blue-700" th:text="${order.status}">STATUS</span>
            </div>

            <div class="mt-4">
                <h3 class="text-sm font-semibold text-gray-700 mb-2" th:text="#{portal.attachments}">Attachments</h3>
                <div class="space-y-2">
                    <div th:each="att : ${attachmentsByOrder[order.id]}" class="flex items-center justify-between border rounded p-3">
                        <div>
                            <p class="text-sm font-medium" th:text="${att.originalFileName}">file</p>
                            <p class="text-xs text-gray-500" th:text="${att.attachmentType}">type</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <a class="text-blue-600 text-sm" th:href="@{/portal/{token}/attachments/{approvalToken}/download(token=${accessToken},approvalToken=${att.approvalToken})}" th:text="#{common.download}">Download</a>
                            <form th:if="${att.attachmentType.name() == 'DESIGN_PREVIEW' and !att.approved}"
                                  th:action="@{/portal/{token}/attachments/{approvalToken}/approve(token=${accessToken},approvalToken=${att.approvalToken})}"
                                  method="post">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="bg-green-600 text-white text-xs px-3 py-1 rounded" th:text="#{portal.approve_design}">Approve design</button>
                            </form>
                            <span th:if="${att.approved}" class="text-green-700 text-xs" th:text="#{portal.approved}">Approved</span>
                        </div>
                    </div>
                    <div th:if="${attachmentsByOrder[order.id] == null || attachmentsByOrder[order.id].isEmpty()}" class="text-sm text-gray-500">
                        <span th:text="#{portal.no_attachments}">No attachments yet.</span>
                    </div>
                </div>
            </div>

            <div class="mt-4 flex justify-end">
                <form th:action="@{/portal/{token}/reorder/{orderToken}(token=${accessToken},orderToken=${order.publicToken})}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded" th:text="#{portal.reorder}">Reorder</button>
                </form>
            </div>
        </div>

        <div th:if="${orders.empty}" class="text-center text-gray-500">
            <span th:text="#{portal.no_orders}">No active orders.</span>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mt-8">
        <h2 class="text-lg font-semibold text-gray-900 mb-3" th:text="#{contact.details}">Contact</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-700">
            <div th:if="${companyBrand != null && companyBrand.email != null}">
                <div class="text-gray-500" th:text="#{contact.email_label}">Email</div>
                <div th:text="${companyBrand.email}">email</div>
            </div>
            <div th:if="${companyBrand != null && companyBrand.phone != null}">
                <div class="text-gray-500" th:text="#{contact.phone_label}">Phone</div>
                <div th:text="${companyBrand.phone}">phone</div>
            </div>
            <div th:if="${companyBrand != null && companyBrand.address != null}">
                <div class="text-gray-500" th:text="#{contact.address_label}">Address</div>
                <div th:text="${companyBrand.address}">address</div>
            </div>
            <div th:if="${companyBrand != null && companyBrand.website != null}">
                <div class="text-gray-500" th:text="#{contact.website_label}">Website</div>
                <div th:text="${companyBrand.website}">website</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
