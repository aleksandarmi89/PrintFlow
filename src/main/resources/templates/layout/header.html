<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
</head>
<body>
    <header th:fragment="header">
        <nav class="bg-white shadow-lg border-b border-gray-200">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center h-16">
                    <!-- Logo -->
                    <div class="flex items-center">
                        <a th:href="@{/admin/dashboard}" class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                                <span class="text-white font-bold">PF</span>
                            </div>
                            <span class="text-xl font-bold text-gray-800">PrintFlow</span>
                        </a>
                    </div>
                    
                    <!-- Desktop Navigation -->
                    <div class="hidden md:flex items-center space-x-4">
                        <div sec:authorize="isAuthenticated()" class="flex items-center space-x-4">
                            <!-- Admin Menu -->
                            <div sec:authorize="hasAuthority('ADMIN')" class="flex items-center space-x-4">
                                <a th:href="@{/admin/dashboard}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    Dashboard
                                </a>
                                <a th:href="@{/admin/clients}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    Clients
                                </a>
                                <a th:href="@{/admin/orders}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    Orders
                                </a>
                                <a th:href="@{/admin/users}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    Users
                                </a>
                            </div>
                            
                            <!-- Worker Menu -->
                            <div sec:authorize="hasAnyAuthority('WORKER_DESIGNER', 'WORKER_PRINTER', 'WORKER_GENERAL')" class="flex items-center space-x-4">
                                <a th:href="@{/worker/dashboard}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    Dashboard
                                </a>
                                <a th:href="@{/worker/my-tasks}" 
                                   class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                    My Tasks
                                </a>
                            </div>
                            
                            <!-- User Dropdown -->
                            <div class="relative">
                                <button id="user-menu-button" 
                                        class="flex items-center space-x-2 text-gray-700 hover:text-primary-600 focus:outline-none">
                                    <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
                                        <span class="text-sm font-medium text-gray-700">
                                            <span sec:authentication="name"></span>
                                        </span>
                                    </div>
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                    </svg>
                                </button>
                                
                                <!-- Dropdown Menu -->
                                <div id="user-dropdown" 
                                     class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-10 border border-gray-200">
                                    <a th:href="@{/profile}" 
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        Profile
                                    </a>
                                    <a th:href="@{/settings}" 
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        Settings
                                    </a>
                                    <div class="border-t border-gray-200"></div>
                                    <form th:action="@{/logout}" method="post">
                                        <button type="submit" 
                                                class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                            Sign out
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Login/Register for non-authenticated users -->
                        <div sec:authorize="!isAuthenticated()" class="flex items-center space-x-4">
                            <a th:href="@{/login}" 
                               class="text-gray-700 hover:text-primary-600 px-3 py-2 rounded-md text-sm font-medium">
                                Login
                            </a>
                            <a th:href="@{/register}" 
                               class="bg-primary-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-primary-700">
                                Register
                            </a>
                        </div>
                    </div>
                    
                    <!-- Mobile menu button -->
                    <div class="md:hidden">
                        <button id="mobile-menu-button" 
                                class="text-gray-700 hover:text-primary-600 focus:outline-none">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Mobile menu -->
                <div id="mobile-menu" class="hidden md:hidden py-2 border-t border-gray-200">
                    <div sec:authorize="isAuthenticated()">
                        <!-- Admin Mobile Menu -->
                        <div sec:authorize="hasAuthority('ADMIN')" class="space-y-1">
                            <a th:href="@{/admin/dashboard}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Dashboard
                            </a>
                            <a th:href="@{/admin/clients}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Clients
                            </a>
                            <a th:href="@{/admin/orders}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Orders
                            </a>
                            <a th:href="@{/admin/users}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Users
                            </a>
                        </div>
                        
                        <!-- Worker Mobile Menu -->
                        <div sec:authorize="hasAnyAuthority('WORKER_DESIGNER', 'WORKER_PRINTER', 'WORKER_GENERAL')" class="space-y-1">
                            <a th:href="@{/worker/dashboard}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Dashboard
                            </a>
                            <a th:href="@{/worker/my-tasks}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                My Tasks
                            </a>
                        </div>
                        
                        <div class="border-t border-gray-200 pt-2 mt-2">
                            <a th:href="@{/profile}" 
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                Profile
                            </a>
                            <form th:action="@{/logout}" method="post" class="mt-2">
                                <button type="submit" 
                                        class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">
                                    Sign out
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <div sec:authorize="!isAuthenticated()" class="space-y-2">
                        <a th:href="@{/login}" 
                           class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                            Login
                        </a>
                        <a th:href="@{/register}" 
                           class="block px-4 py-2 bg-primary-600 text-white rounded-md">
                            Register
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        
        <script>
            // Mobile menu toggle
            document.getElementById('mobile-menu-button').addEventListener('click', function() {
                const menu = document.getElementById('mobile-menu');
                menu.classList.toggle('hidden');
            });
            
            // User dropdown toggle
            const userMenuButton = document.getElementById('user-menu-button');
            const userDropdown = document.getElementById('user-dropdown');
            
            if (userMenuButton && userDropdown) {
                userMenuButton.addEventListener('click', function(e) {
                    e.stopPropagation();
                    userDropdown.classList.toggle('hidden');
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', function(e) {
                    if (!userDropdown.contains(e.target) && !userMenuButton.contains(e.target)) {
                        userDropdown.classList.add('hidden');
                    }
                });
            }
        </script>
    </header>
</body>
</html>
