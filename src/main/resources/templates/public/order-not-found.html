<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{order_not_found.title}">Order Not Found - PrintFlow</title>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">
            <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center text-red-600">
                !
            </div>
            <h1 class="text-2xl font-semibold text-gray-900"
                th:text="${errorHeadingKey != null ? #messages.msg(errorHeadingKey) : #messages.msg('order_not_found.heading')}">
                Order not found
            </h1>
            <p class="text-gray-600 mt-2"
               th:text="${errorKey != null ? #messages.msg(errorKey) : (error != null ? error : #messages.msg('order_not_found.message'))}">
                The tracking link is invalid or has expired. Please check the link or contact the print shop.
            </p>
            <div class="mt-6 flex items-center justify-center gap-3">
                <a th:href="@{/public/track(lang=${#locale.language == 'en' ? 'en' : 'sr'})}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" th:text="#{order_not_found.track_another}">
                    Track another order
                </a>
                <a th:href="@{/public/(lang=${#locale.language == 'en' ? 'en' : 'sr'})}" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50" th:text="#{order_not_found.public_home}">
                    Public home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
