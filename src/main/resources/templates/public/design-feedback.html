<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{public.design_feedback.page_title} + ' - PrintFlow'">Feedback - PrintFlow</title>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">
            <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-green-100 flex items-center justify-center text-green-700">
                ✓
            </div>
            <h1 class="text-2xl font-semibold text-gray-900" th:text="#{public.design_feedback.heading}">
                Feedback submitted
            </h1>
            <p class="text-gray-600 mt-2"
               th:text="${messageKey != null ? #messages.msg(messageKey) : #messages.msg('public.design_feedback.approved')}">
                Thank you for your feedback.
            </p>
            <div class="mt-6">
                <a th:href="@{/public/track}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                   th:text="#{order_not_found.track_another}">
                    Track another order
                </a>
            </div>
        </div>
    </div>
</body>
</html>
