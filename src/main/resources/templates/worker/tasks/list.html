<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>My Tasks - PrintFlow Worker</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>
    
    <main class="container mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">My Tasks</h1>
                    <p class="text-gray-600 mt-2">Orders assigned to you and their current status</p>
                </div>
                <div class="flex space-x-3">
                    <button onclick="refreshTasks()" 
                            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/>
                        </svg>
                        Refresh
                    </button>
                    <select onchange="filterTasks(this.value)" 
                            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700">
                        <option value="all">All Tasks</option>
                        <option value="today">Due Today</option>
                        <option value="this_week">This Week</option>
                        <option value="overdue">Overdue</option>
                        <option value="high_priority">High Priority</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">Total Tasks</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.totalTasks}">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-yellow-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">In Progress</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.inProgressTasks}">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">Urgent</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.urgentTasks}">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600">Completed Today</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.completedToday}">0</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Tasks Grid/List -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div th:each="task : ${tasks}" 
                 class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                <div class="p-6">
                    <!-- Task Header -->
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900">
                                <a th:href="@{/worker/tasks/{id}(id=${task.id})}" 
                                   class="hover:text-blue-600">
                                    <span th:text="${task.orderNumber}"></span>: <span th:text="${task.title}"></span>
                                </a>
                            </h3>
                            <p class="text-sm text-gray-500 mt-1">
                                Client: <span class="font-medium" th:text="${task.clientName}"></span>
                            </p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span th:class="${'px-2 py-1 text-xs font-medium rounded-full ' + 
                                (task.priority == 'HIGH' ? 'bg-red-100 text-red-800' :
                                 task.priority == 'MEDIUM' ? 'bg-yellow-100 text-yellow-800' :
                                 'bg-blue-100 text-blue-800')}">
                                <span th:text="${task.priority}"></span>
                            </span>
                            <span th:class="${'px-2 py-1 text-xs font-medium rounded-full ' + 
                                (task.status == 'NEW' ? 'bg-blue-100 text-blue-800' :
                                 task.status == 'IN_PROGRESS' ? 'bg-yellow-100 text-yellow-800' :
                                 task.status == 'WAITING_APPROVAL' ? 'bg-orange-100 text-orange-800' :
                                 task.status == 'COMPLETED' ? 'bg-green-100 text-green-800' :
                                 'bg-gray-100 text-gray-800')}">
                                <span th:text="${task.status}"></span>
                            </span>
                        </div>
                    </div>
                    
                    <!-- Task Description -->
                    <p class="text-gray-600 text-sm mb-4 line-clamp-2" th:text="${task.description}"></p>
                    
                    <!-- Task Details -->
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="text-xs text-gray-500">Deadline</p>
                            <p class="text-sm font-medium" th:class="${task.isOverdue ? 'text-red-600' : 'text-gray-900'}">
                                <span th:text="${#temporals.format(task.deadline, 'dd.MM.yyyy')}"></span>
                                <span th:if="${task.isOverdue}" class="ml-1">⚠️ Overdue</span>
                            </p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500">Created</p>
                            <p class="text-sm text-gray-900" th:text="${#temporals.format(task.createdAt, 'dd.MM.yyyy')}"></p>
                        </div>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="mb-4">
                        <div class="flex justify-between text-xs text-gray-500 mb-1">
                            <span>Progress</span>
                            <span th:text="${task.progress} + '%'">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" th:style="'width:' + ${task.progress} + '%'"></div>
                        </div>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex justify-between items-center pt-4 border-t border-gray-100">
                        <div class="text-sm text-gray-500">
                            <span th:if="${task.attachmentsCount > 0}">
                                📎 <span th:text="${task.attachmentsCount}"></span> files
                            </span>
                        </div>
                        <div class="flex space-x-2">
                            <a th:href="@{/worker/tasks/{id}(id=${task.id})}" 
                               class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">
                                View Details
                            </a>
                            <form th:action="@{/worker/tasks/{id}/start(id=${task.id})}" 
                                  method="post"
                                  th:if="${task.status == 'NEW'}"
                                  class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" 
                                        class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">
                                    Start Work
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div th:if="${tasks.empty}" class="text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No tasks assigned</h3>
            <p class="mt-1 text-sm text-gray-500">You don't have any tasks assigned to you yet.</p>
        </div>
    </main>
    
    <div th:replace="~{layout/footer :: footer}"></div>
    
    <script>
        function refreshTasks() {
            window.location.reload();
        }
        
        function filterTasks(filter) {
            // In production, this would make an API call
            window.location.href = '/worker/tasks?filter=' + filter;
        }
        
        // Auto-refresh every 60 seconds
        setInterval(refreshTasks, 60000);
    </script>
</body>
</html>
