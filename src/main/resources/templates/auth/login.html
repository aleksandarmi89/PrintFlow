<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login_title} + ' - PrintFlow'">Login - PrintFlow</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg">
        <!-- Header -->
        <div>
            <div class="flex flex-col items-center justify-center">
                <div class="w-full flex items-center justify-center min-h-[7.5rem]">
                    <img th:src="@{/images/app-logo.svg}" alt="ProPrintFlow" class="w-40 sm:w-48 h-auto object-contain"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                    <div style="display:none" class="w-40 sm:w-48 h-24 bg-blue-600 rounded-lg items-center justify-center">
                        <span class="text-white font-bold text-xl">PF</span>
                    </div>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900" th:text="#{auth.sign_in_title}">
                Sign in to your account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600" th:text="#{auth.sign_in_subtitle}">
                Use your company credentials to access PrintFlow.
            </p>
        </div>
        
        <!-- Login Form -->
        <form class="mt-8 space-y-6" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <!-- Error Messages -->
            <div th:if="${param.error}" class="bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex">
                    <svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <div class="ml-3">
                        <p class="text-sm text-red-700" th:text="#{auth.login_error}">
                            Invalid username or password.
                        </p>
                    </div>
                </div>
            </div>
            
            <div th:if="${param.logout}" class="bg-green-50 border border-green-200 rounded-lg p-4">
                <div class="flex">
                    <svg class="h-5 w-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <div class="ml-3">
                        <p class="text-sm text-green-700" th:text="#{auth.logout_success}">
                            You have been logged out successfully.
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Form Fields -->
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="username" class="sr-only" th:text="#{auth.username}">Username</label>
                    <input id="username" name="username" type="text" required
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                           th:placeholder="#{auth.username}">
                </div>
                <div>
                    <label for="password" class="sr-only" th:text="#{auth.password}">Password</label>
                    <input id="password" name="password" type="password" required
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                           th:placeholder="#{auth.password}">
                </div>
            </div>
            
            <!-- Remember Me -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900" th:text="#{auth.remember_me}">
                        Remember me
                    </label>
                </div>
                <a th:href="@{/forgot-password}" class="text-sm text-blue-600 hover:text-blue-500" th:text="#{auth.forgot_password}">
                    Forgot password?
                </a>
            </div>
            
            <!-- Submit Button -->
            <div>
                <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    <span th:text="#{auth.sign_in}">Sign in</span>
                </button>
            </div>
        </form>
        
        <!-- Back to Home -->
        <div class="text-center mt-4 space-y-2">
            <a th:href="@{/register}" class="inline-flex items-center justify-center w-full border border-blue-600 text-blue-600 rounded-md px-4 py-2 text-sm font-medium hover:bg-blue-50"
               th:text="#{auth.create_account}">
                Create account
            </a>
            <a th:href="@{/public/}" class="text-sm text-blue-600 hover:text-blue-500 block" th:text="#{auth.back_home}">
                ← Back to home page
            </a>
        </div>
    </div>
</body>
</html>
