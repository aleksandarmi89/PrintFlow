<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Invite - PrintFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-6 p-8 bg-white rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold text-gray-900 text-center">Accept Invitation</h2>

        <div th:if="${errorMessage}" class="bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-sm text-red-700" th:text="${errorMessage}"></p>
        </div>
        <div th:if="${successMessage}" class="bg-green-50 border border-green-200 rounded-lg p-4">
            <p class="text-sm text-green-700" th:text="${successMessage}"></p>
            <a th:href="@{/login}" class="text-sm text-blue-600 underline">Go to login</a>
        </div>

        <form th:if="${token}" th:action="@{/invite/{token}(token=${token})}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="text" th:value="${email}" disabled
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-100"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Role</label>
                <input type="text" th:value="${role}" disabled
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-100"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="username">Username *</label>
                <input id="username" name="username" type="text" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="fullName">Full Name</label>
                <input id="fullName" name="fullName" type="text"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="password">Password *</label>
                <input id="password" name="password" type="password" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="confirmPassword">Confirm Password *</label>
                <input id="confirmPassword" name="confirmPassword" type="password" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Create Account
            </button>
        </form>
    </div>
</body>
</html>
