<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{auth.settings_title} + ' - PrintFlow'">Settings - PrintFlow</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-3xl mx-auto">
                <div id="password-settings" class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2" th:text="#{auth.settings_title}">Settings</h1>
                <p class="text-gray-600" th:text="#{auth.settings_subtitle}">Configure your account preferences.</p>
                <div class="mt-3">
                    <a th:href="@{/profile}" class="text-sm text-blue-600 hover:text-blue-700" th:text="#{auth.profile_title}">Profile</a>
                </div>

                <div th:if="${successMessage}" class="mt-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700"
                     th:with="m=${#messages.msgOrNull(successMessage)}"
                     th:text="${m != null ? m : successMessage}"></div>
                <div th:if="${errorMessage}" class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
                     th:with="m=${#messages.msgOrNull(errorMessage)}"
                     th:text="${m != null ? m : errorMessage}"></div>

                <div class="mt-6 border-t border-gray-200 pt-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4" th:text="#{auth.settings.change_password}">Change Password</h2>
                    <form th:action="@{/settings/password}" method="post" class="space-y-4">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div>
                            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.settings.current_password}">Current password</label>
                            <input id="currentPassword" type="password" name="currentPassword" required autocomplete="current-password"
                                   class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.settings.new_password}">New password</label>
                            <input id="newPassword" type="password" name="newPassword" required minlength="6" autocomplete="new-password"
                                   class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.settings.confirm_new_password}">Confirm new password</label>
                            <input id="confirmPassword" type="password" name="confirmPassword" required minlength="6" autocomplete="new-password"
                                   class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2">
                            <p class="mt-1 text-xs text-gray-500" th:text="#{auth.password_min}">Password must be at least 6 characters long.</p>
                            <p id="passwordMismatchHint" class="mt-1 hidden text-xs text-red-600" th:text="#{auth.password_mismatch}">Passwords do not match!</p>
                        </div>
                        <div class="flex justify-end">
                            <button id="updatePasswordBtn" type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg disabled:opacity-50 disabled:cursor-not-allowed" th:text="#{auth.settings.update_password}">Update password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const mismatchHint = document.getElementById('passwordMismatchHint');
            const submitBtn = document.getElementById('updatePasswordBtn');

            function validatePasswordForm() {
                if (!newPassword || !confirmPassword || !submitBtn) {
                    return;
                }
                const newValue = newPassword.value || '';
                const confirmValue = confirmPassword.value || '';
                const hasBoth = newValue.length > 0 || confirmValue.length > 0;
                const validLength = newValue.length >= 6 && confirmValue.length >= 6;
                const matches = newValue === confirmValue;
                const valid = !hasBoth || (validLength && matches);

                if (mismatchHint) {
                    mismatchHint.classList.toggle('hidden', !hasBoth || matches);
                }
                submitBtn.disabled = !valid;
            }

            newPassword?.addEventListener('input', validatePasswordForm);
            confirmPassword?.addEventListener('input', validatePasswordForm);
            validatePasswordForm();
        });
    </script>
</body>
</html>
