<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.reset_title} + ' - PrintFlow'">Reset Password - PrintFlow</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full space-y-6 p-8 bg-white rounded-xl shadow-lg">
    <div class="text-center">
        <div th:if="${companyBrand != null and companyBrand.logoUrl != null}" class="mx-auto w-16 h-16 rounded-lg bg-white flex items-center justify-center shadow-sm border border-gray-200">
            <img th:src="${companyBrand.logoUrl}" alt="Logo" class="h-12 w-12 object-contain">
        </div>
        <div th:if="${companyBrand == null || companyBrand.logoUrl == null}" class="w-16 h-16 rounded-lg flex items-center justify-center shadow-sm mx-auto">
            <img th:src="@{/images/app-logo.svg}" alt="ProPrintFlow" class="w-24 h-24 object-contain"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div style="display:none" class="w-24 h-24 bg-blue-600 rounded-lg items-center justify-center">
                <span class="text-white font-bold text-xl">PF</span>
            </div>
        </div>
        <h2 class="mt-6 text-2xl font-bold text-gray-900" th:text="#{auth.reset_title}">Reset password</h2>
        <p class="mt-2 text-sm text-gray-600" th:text="#{auth.reset_subtitle}">
            Choose a new password for your account.
        </p>
        <div th:if="${tokenValid}" class="mt-4 rounded-lg border border-blue-200 bg-blue-50 px-4 py-3 text-left">
            <h3 class="text-sm font-semibold text-blue-900" th:text="#{auth.reset.smart.title}">Password helper</h3>
            <p class="mt-1 text-xs text-blue-800" th:text="#{auth.reset.smart.subtitle}">
                Use a strong password and confirm it to avoid typing mistakes.
            </p>
            <p id="resetSmartHint" class="mt-2 text-xs text-blue-900"></p>
            <p id="resetMatchHint" class="mt-1 text-xs text-blue-900"></p>
        </div>
    </div>

    <div th:if="${!tokenValid}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <span th:text="#{auth.reset_invalid_token}">This reset link is invalid or expired.</span>
    </div>

    <div th:if="${resetError != null}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <span th:text="#{${resetError}}">Invalid input.</span>
    </div>

    <form th:if="${tokenValid}" th:action="@{/reset-password}" method="post" class="space-y-4">
        <input type="hidden" name="token" th:value="${token}"/>
        <div>
            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.new_password}">New password</label>
            <input id="resetPassword" type="password" name="password" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                   th:placeholder="#{auth.new_password}">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.confirm_password}">Confirm password</label>
            <input id="resetConfirmPassword" type="password" name="confirmPassword" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                   th:placeholder="#{auth.confirm_password}">
        </div>
        <div id="resetFormError"
             class="hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
        <button type="submit"
                class="w-full py-2 px-4 rounded-md text-white bg-blue-600 hover:bg-blue-700">
            <span th:text="#{auth.reset_action}">Reset password</span>
        </button>
    </form>

    <div class="text-center">
        <a th:href="@{/login}" class="text-sm text-blue-600 hover:text-blue-500" th:text="#{auth.back_to_login}">
            Back to login
        </a>
    </div>
</div>
<div id="resetSmartI18n"
     class="hidden"
     th:attr="data-weak=#{auth.reset.smart.weak},
              data-ok=#{auth.reset.smart.ok},
              data-match-ok=#{auth.reset.smart.match_ok},
              data-match-fail=#{auth.reset.smart.match_fail},
              data-match-pending=#{auth.reset.smart.match_pending},
              data-invalid=#{auth.reset_invalid}">
</div>
<script>
    (function () {
        const form = document.querySelector('form[method=\"post\"]');
        const password = document.getElementById('resetPassword');
        const confirmPassword = document.getElementById('resetConfirmPassword');
        const smartHint = document.getElementById('resetSmartHint');
        const matchHint = document.getElementById('resetMatchHint');
        const formError = document.getElementById('resetFormError');
        const i18nEl = document.getElementById('resetSmartI18n');
        if (!form || !password || !confirmPassword || !smartHint || !matchHint || !i18nEl) return;
        const i18n = {
            weak: i18nEl.getAttribute('data-weak') || 'Use at least 8 characters with letters and numbers.',
            ok: i18nEl.getAttribute('data-ok') || 'Password strength looks good.',
            matchOk: i18nEl.getAttribute('data-match-ok') || 'Passwords match.',
            matchFail: i18nEl.getAttribute('data-match-fail') || 'Passwords do not match.',
            matchPending: i18nEl.getAttribute('data-match-pending') || 'Confirm password to avoid typing mistakes.',
            invalid: i18nEl.getAttribute('data-invalid') || 'Please enter a valid password and confirm it.'
        };
        function isStrong(value) {
            if (!value || value.length < 8) return false;
            return /[A-Za-z]/.test(value) && /[0-9]/.test(value);
        }
        function updateHints() {
            const pass = password.value || '';
            const confirm = confirmPassword.value || '';
            smartHint.textContent = pass ? (isStrong(pass) ? i18n.ok : i18n.weak) : '';
            if (!confirm) {
                matchHint.textContent = i18n.matchPending;
            } else if (pass === confirm) {
                matchHint.textContent = i18n.matchOk;
            } else {
                matchHint.textContent = i18n.matchFail;
            }
        }
        [password, confirmPassword].forEach(el => {
            el.addEventListener('input', updateHints);
            el.addEventListener('change', updateHints);
        });
        form.addEventListener('submit', function (e) {
            if (formError) {
                formError.classList.add('hidden');
                formError.textContent = '';
            }
            const pass = password.value || '';
            const confirm = confirmPassword.value || '';
            if (!isStrong(pass) || pass !== confirm) {
                e.preventDefault();
                if (formError) {
                    formError.textContent = i18n.invalid;
                    formError.classList.remove('hidden');
                }
            }
        });
        updateHints();
    })();
</script>
</body>
</html>
