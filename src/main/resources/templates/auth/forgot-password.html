<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.forgot_title} + ' - PrintFlow'">Forgot Password - PrintFlow</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full space-y-6 p-8 bg-white rounded-xl shadow-lg">
    <div class="text-center">
        <div class="w-16 h-16 rounded-lg flex items-center justify-center shadow-sm mx-auto">
            <img th:src="@{/images/app-logo.svg}" alt="ProPrintFlow" class="w-24 h-24 object-contain"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div style="display:none" class="w-24 h-24 bg-blue-600 rounded-lg items-center justify-center">
                <span class="text-white font-bold text-xl">PF</span>
            </div>
        </div>
        <h2 class="mt-6 text-2xl font-bold text-gray-900" th:text="#{auth.forgot_title}">Forgot password</h2>
        <p class="mt-2 text-sm text-gray-600" th:text="#{auth.forgot_subtitle}">
            Enter your username or email and we will send a reset link.
        </p>
        <div class="mt-4 rounded-lg border border-blue-200 bg-blue-50 px-4 py-3 text-left">
            <h3 class="text-sm font-semibold text-blue-900" th:text="#{auth.forgot.smart.title}">Reset helper</h3>
            <p class="mt-1 text-xs text-blue-800" th:text="#{auth.forgot.smart.subtitle}">
                Use the same username/email you use for login.
            </p>
            <p id="forgotSmartHint" class="mt-2 text-xs text-blue-900"></p>
        </div>
    </div>

    <div th:if="${resetRequested}" class="rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
        <span th:text="#{auth.reset_sent}">If an account exists, a reset link has been sent.</span>
    </div>
    <div th:if="${resetError != null}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <span th:text="#{${resetError}}">Too many requests.</span>
    </div>

    <form th:action="@{/forgot-password}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700" th:text="#{auth.identifier}">Username or email</label>
            <input id="forgotIdentifier" type="text" name="identifier" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                   th:placeholder="#{auth.identifier_placeholder}">
        </div>
        <button type="submit"
                class="w-full py-2 px-4 rounded-md text-white bg-blue-600 hover:bg-blue-700">
            <span th:text="#{auth.send_reset}">Send reset link</span>
        </button>
    </form>

    <div class="text-center">
        <a th:href="@{/login}" class="text-sm text-blue-600 hover:text-blue-500" th:text="#{auth.back_to_login}">
            Back to login
        </a>
    </div>
</div>
<div id="forgotSmartI18n"
     class="hidden"
     th:attr="data-empty=#{auth.forgot.smart.empty},
              data-username=#{auth.forgot.smart.username},
              data-email=#{auth.forgot.smart.email},
              data-invalid-email=#{auth.forgot.smart.invalid_email},
              data-ready=#{auth.forgot.smart.ready}">
</div>
<script>
    (function () {
        const input = document.getElementById('forgotIdentifier');
        const hint = document.getElementById('forgotSmartHint');
        const i18nEl = document.getElementById('forgotSmartI18n');
        if (!input || !hint || !i18nEl) return;
        const i18n = {
            empty: i18nEl.getAttribute('data-empty') || 'Enter username or email to receive reset link.',
            username: i18nEl.getAttribute('data-username') || 'Username format detected.',
            email: i18nEl.getAttribute('data-email') || 'Email format detected.',
            invalidEmail: i18nEl.getAttribute('data-invalid-email') || 'Email format looks incomplete.',
            ready: i18nEl.getAttribute('data-ready') || 'Looks good. Submit to request reset link.'
        };
        function updateHint() {
            const value = (input.value || '').trim();
            if (!value) {
                hint.textContent = i18n.empty;
                return;
            }
            if (value.includes('@')) {
                const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
                hint.textContent = validEmail ? `${i18n.email} ${i18n.ready}` : i18n.invalidEmail;
                return;
            }
            hint.textContent = `${i18n.username} ${i18n.ready}`;
        }
        input.addEventListener('blur', function () {
            input.value = (input.value || '').trim();
            updateHint();
        });
        input.addEventListener('input', updateHint);
        updateHint();
    })();
</script>
</body>
</html>
