<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.email_preview.title}">Email Preview - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <a th:href="@{/admin/orders/{id}(id=${orderId})}"
               class="text-sm text-blue-600 hover:text-blue-800"
               th:text="#{admin.email_preview.back_to_order}">← Back to order</a>
            <h1 class="text-2xl font-bold text-gray-900 mt-2" th:text="#{admin.email_preview.heading}">Email Preview</h1>
            <p class="text-sm text-gray-500"><span th:text="#{admin.email_preview.subject}">Subject</span>: <span th:text="${subject}"></span></p>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-6">
            <form th:action="@{/admin/orders/{id}/email-preview(id=${orderId})}" method="get"
                  class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{admin.email_preview.template}">Template</label>
                    <select name="type" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="approval" th:selected="${type == 'approval'}" th:text="#{admin.email_preview.template.approval}">Approval</option>
                        <option value="feedback-approved" th:selected="${type == 'feedback-approved'}" th:text="#{admin.email_preview.template.feedback_approved}">Feedback Approved</option>
                        <option value="feedback-changes" th:selected="${type == 'feedback-changes'}" th:text="#{admin.email_preview.template.feedback_changes}">Feedback Changes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{admin.email_preview.comment_optional}">Comment (optional)</label>
                    <input type="text" name="comment" th:value="${comment}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg" th:placeholder="#{admin.email_preview.comment_placeholder}">
                </div>
                <div>
                    <button type="submit"
                            class="w-full px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                            th:text="#{admin.email_preview.update_preview}">
                        Update Preview
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-200 text-sm text-gray-600">
                <span th:text="#{admin.email_preview.preview_type}">Preview type</span>: <span th:text="${type}"></span>
            </div>
            <div class="p-4 bg-gray-50">
                <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
                    <div th:utext="${html}"></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mt-6">
            <form id="sendTestEmailForm" th:action="@{/admin/orders/{id}/email-preview/send-test(id=${orderId})}" method="post"
                  class="flex flex-wrap items-center gap-3">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="type" th:value="${type}"/>
                <input type="hidden" name="comment" th:value="${comment}"/>
                <input type="email" name="toEmail" id="toEmailInput" th:placeholder="#{admin.email_preview.test_email_placeholder}" required
                       pattern="^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
                       th:value="${currentUserEmail}"
                       class="px-3 py-2 border border-gray-300 rounded-lg w-64">
                <button type="submit"
                        class="px-3 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700"
                        th:text="#{admin.email_preview.send_test_email}">
                    Send Test Email
                </button>
                <button type="button" id="sendTestToMeBtn"
                        class="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200"
                        th:text="#{admin.email_preview.send_to_me}">
                    Send to me
                </button>
                <label class="inline-flex items-center gap-2 text-xs text-gray-600 ml-2">
                    <input type="checkbox" id="autoSendToggle" class="h-4 w-4">
                    <span th:text="#{admin.email_preview.auto_send_on_load}">Auto-send on load</span>
                </label>
            </form>
            <div id="sendTestEmailFeedback" class="mt-3 text-sm hidden"></div>
        </div>
    </main>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const msg = {
                missingEmail: /*[[#{admin.email_preview.error.email_missing}]]*/ 'Your email is not available.',
                invalidEmail: /*[[#{admin.email_preview.error.invalid_email}]]*/ 'Please provide a valid email address.',
                sendError: /*[[#{admin.email_preview.error.send_failed}]]*/ 'Error sending test email'
            };
            const form = document.getElementById('sendTestEmailForm');
            const feedback = document.getElementById('sendTestEmailFeedback');
            const emailInput = document.getElementById('toEmailInput');
            const sendToMeBtn = document.getElementById('sendTestToMeBtn');
            const autoToggle = document.getElementById('autoSendToggle');
            if (!form || !feedback) return;
            const autoKey = `emailPreviewAutoSendEnabled:${form.action}:${form.querySelector('input[name="type"]').value}`;
            if (autoToggle) {
                autoToggle.checked = localStorage.getItem(autoKey) === '1';
                autoToggle.addEventListener('change', () => {
                    localStorage.setItem(autoKey, autoToggle.checked ? '1' : '0');
                });
            }
            if (autoToggle && autoToggle.checked && emailInput && emailInput.value && emailInput.value.trim() !== '') {
                const key = `emailPreviewAutoSent:${form.action}:${form.querySelector('input[name="type"]').value}:${form.querySelector('input[name="comment"]').value || ''}`;
                if (!sessionStorage.getItem(key)) {
                    sessionStorage.setItem(key, '1');
                    form.requestSubmit();
                }
            }
            if (sendToMeBtn && emailInput) {
                sendToMeBtn.addEventListener('click', () => {
                    if (emailInput.value && emailInput.value.trim() !== '') {
                        form.requestSubmit();
                    } else {
                        feedback.textContent = msg.missingEmail;
                        feedback.classList.add('text-red-600');
                        feedback.classList.remove('hidden');
                    }
                });
            }
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                feedback.classList.add('hidden');
                feedback.classList.remove('text-red-600', 'text-emerald-600');
                if (emailInput && !emailInput.checkValidity()) {
                    feedback.textContent = msg.invalidEmail;
                    feedback.classList.add('text-red-600');
                    feedback.classList.remove('hidden');
                    return;
                }
                const formData = new FormData(form);
                const action = form.action + '-ajax';
                try {
                    const res = await fetch(action, {
                        method: 'POST',
                        headers: { 'X-Requested-With': 'XMLHttpRequest' },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.status === 'ok') {
                        feedback.textContent = data.message;
                        feedback.classList.add('text-emerald-600');
                    } else {
                        feedback.textContent = data.message || msg.sendError;
                        feedback.classList.add('text-red-600');
                    }
                } catch (err) {
                    feedback.textContent = msg.sendError;
                    feedback.classList.add('text-red-600');
                }
                feedback.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
