<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.users.invite.title}">Invite User - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <h1 class="text-2xl font-bold text-gray-900" th:text="#{admin.users.invite.heading}">Invite User</h1>
            <a th:href="@{/admin/users}" class="text-sm text-blue-600 hover:text-blue-700" th:text="#{admin.users.form.back_to_users}">Back to users</a>
        </div>

        <div th:if="${errorMessage}" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
            <p class="text-sm text-red-700"
               th:with="m=${#messages.msgOrNull(errorMessage)}"
               th:text="${m != null ? m : errorMessage}"></p>
        </div>

        <div th:if="${inviteLink}" class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
            <p class="text-sm text-green-700" th:text="#{admin.users.invite.link_label}">Invite link (copy and send):</p>
            <code class="text-xs break-all" th:text="${inviteLink}"></code>
        </div>

        <form th:action="@{/admin/users/invite}" method="post" class="space-y-4 max-w-lg">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label class="block text-sm font-medium text-gray-700" for="email" th:text="#{admin.users.invite.email_required}">Email *</label>
                <input id="email" name="email" type="email" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="role" th:text="#{admin.users.invite.role_required}">Role *</label>
                <select id="role" name="role" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                    <option th:each="r : ${roles}" th:value="${r}"
                            th:text="${#messages.msgOrNull('users.role.' + r) != null ? #messages.msg('users.role.' + r) : r}"></option>
                </select>
            </div>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                    th:text="#{admin.users.invite.create}">
                Create Invite
            </button>
        </form>
    </main>
</body>
</html>
