<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Invite User - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Invite User</h1>

        <div th:if="${errorMessage}" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
            <p class="text-sm text-red-700" th:text="${errorMessage}"></p>
        </div>

        <div th:if="${inviteLink}" class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
            <p class="text-sm text-green-700">Invite link (copy and send):</p>
            <code class="text-xs break-all" th:text="${inviteLink}"></code>
        </div>

        <form th:action="@{/admin/users/invite}" method="post" class="space-y-4 max-w-lg">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label class="block text-sm font-medium text-gray-700" for="email">Email *</label>
                <input id="email" name="email" type="email" required
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700" for="role">Role *</label>
                <select id="role" name="role" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Create Invite
            </button>
        </form>
    </main>
</body>
</html>
