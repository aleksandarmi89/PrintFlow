<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.users.list.title}">Users - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>
    
    <main class="container mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900" th:text="#{admin.users.list.heading}">Users</h1>
                    <p class="text-gray-600 mt-2" th:text="#{admin.users.list.subtitle}">Manage system users and permissions</p>
                </div>
                <div class="flex items-center gap-3">
                    <a th:href="@{/admin/users/invite}" 
                       class="px-4 py-2 border border-gray-300 text-gray-800 rounded-lg hover:bg-gray-50 flex items-center"
                       th:text="#{admin.users.list.invite_user}">
                        Invite User
                    </a>
                    <a th:href="@{/admin/users/create}" 
                       class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        <span th:text="#{admin.users.list.add_user}">Add User</span>
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Users Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200">
            <!-- Table Header -->
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <div class="flex-1">
                        <input type="text" 
                               th:placeholder="#{admin.users.list.search.placeholder}" 
                               class="px-4 py-2 border border-gray-300 rounded-lg w-full max-w-md"
                               id="searchInput">
                    </div>
                    <div class="flex space-x-3">
                        <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option th:text="#{admin.users.list.role_filter.all}">All Roles</option>
                            <option th:text="#{admin.users.list.role_filter.admin}">Admin</option>
                            <option th:text="#{admin.users.list.role_filter.worker}">Worker</option>
                        </select>
                        <button onclick="exportUsers()" 
                                class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                            <span th:text="#{common.export}">Export</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Users List -->
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.user}">User</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.role}">Role</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.email}">Email</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.phone}">Phone</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.status}">Status</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <span th:text="#{common.actions}">Actions</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="user : ${users}">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 h-10 w-10 bg-blue-100 rounded-lg flex items-center justify-center">
                                        <span th:text="${user.firstName != null and !user.firstName.isEmpty() ? user.firstName.substring(0,1) : '?'} + ${user.lastName != null and !user.lastName.isEmpty() ? user.lastName.substring(0,1) : ''}"></span>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900">
                                            <span th:text="${user.firstName + ' ' + user.lastName}"></span>
                                        </div>
                                        <div class="text-sm text-gray-500">
                                            <span th:text="#{common.id}">ID</span>: <span th:text="${user.id}"></span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:class="${'px-2 py-1 text-xs font-medium rounded-full ' + 
                                    (user.role == 'ADMIN' ? 'bg-purple-100 text-purple-800' :
                                     user.role == 'WORKER' ? 'bg-green-100 text-green-800' :
                                     'bg-gray-100 text-gray-800')}">
                                    <span th:text="${user.role}"></span>
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                <span th:text="${user.email}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                <span th:text="${user.phone ?: #messages.msg('common.na')}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:class="${'px-2 py-1 text-xs font-medium rounded-full ' + 
                                    (user.active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800')}">
                                    <span th:text="${user.active ? #messages.msg('common.active') : #messages.msg('common.inactive')}"></span>
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <div class="flex space-x-3">
                                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" 
                                       class="text-blue-600 hover:text-blue-900"
                                       th:text="#{common.edit}">
                                        Edit
                                    </a>
                                    <a th:href="@{/admin/users/permissions/{id}(id=${user.id})}" 
                                       class="text-purple-600 hover:text-purple-900"
                                       th:text="#{admin.users.list.permissions}">
                                        Permissions
                                    </a>
                                    <form th:action="@{/admin/users/{id}/toggle-active(id=${user.id})}" 
                                          method="post"
                                          class="inline">
                                       <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                                        <button type="submit" 
                                                th:text="${user.active ? #messages.msg('admin.users.list.deactivate') : #messages.msg('admin.users.list.activate')}"
                                                th:class="${user.active ? 'text-yellow-600 hover:text-yellow-900' : 'text-green-600 hover:text-green-900'}">
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-gray-200">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-sm text-gray-700">
                        <span th:text="#{pagination.showing}">Showing</span>
                        <span class="font-medium" th:text="${pagination.start + 1}"></span>
                        <span th:text="#{pagination.to}">to</span>
                        <span class="font-medium" th:text="${pagination.end}"></span>
                        <span th:text="#{pagination.of}">of</span>
                        <span class="font-medium" th:text="${pagination.total}"></span>
                        <span th:text="#{pagination.results}">results</span>
                    </div>
                    <div class="flex space-x-2">
                        <a th:href="@{/admin/users(page=${pagination.currentPage - 1},size=${size})}" 
                           th:unless="${pagination.currentPage == 0}"
                           class="px-3 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            <span th:text="#{pagination.previous}">Previous</span>
                        </a>
                        <a th:href="@{/admin/users(page=${pagination.currentPage + 1},size=${size})}" 
                           th:unless="${pagination.end == pagination.total}"
                           class="px-3 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            <span th:text="#{pagination.next}">Next</span>
                        </a>
                    </div>
                    <form th:action="@{/admin/users}" method="get" class="flex items-center gap-2">
                        <input type="hidden" name="page" value="0">
                        <label class="text-sm text-gray-600" th:text="#{pagination.size}">Size</label>
                        <select name="size" class="border rounded px-2 py-1 text-sm" onchange="this.form.submit()">
                            <option th:each="opt : ${allowedSizes}"
                                    th:value="${opt}"
                                    th:text="${opt}"
                                    th:selected="${opt == size}">20</option>
                        </select>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- Statistics -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600" th:text="#{admin.users.list.stats.total_users}">Total Users</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.totalUsers}"></p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-purple-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 11H13a1 1 0 100-2H9.414l1.293-1.293a1 1 0 000-1.414z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600" th:text="#{admin.users.list.stats.admin_users}">Admin Users</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.adminUsers}"></p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 11H13a1 1 0 100-2H9.414l1.293-1.293a1 1 0 000-1.414z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600" th:text="#{admin.users.list.stats.worker_users}">Worker Users</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.workerUsers}"></p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm text-gray-600" th:text="#{admin.users.list.stats.active_users}">Active Users</p>
                        <p class="text-2xl font-bold text-gray-900" th:text="${stats.activeUsers}"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div th:replace="~{layout/footer :: footer}"></div>
    
    <script>
        // Simple search functionality
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('tbody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });
        
        function exportUsers() {
            // In production, this would call an export endpoint
            window.location.href = '/admin/users/export';
        }
    </script>
</body>
</html>
