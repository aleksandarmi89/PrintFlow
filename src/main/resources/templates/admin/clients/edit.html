<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="'Edit ' + ${client.companyName} + ' - PrintFlow Admin'"></title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>
    
    <main class="container mx-auto px-4 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Edit Client</h1>
                    <p class="text-gray-600 mt-2" th:text="${client.companyName}"></p>
                </div>
                <a th:href="@{/admin/clients}" 
                   class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    ← Back to Clients
                </a>
            </div>
        </div>
        
        <!-- Client Form -->
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900">Edit Client Information</h2>
                </div>
                
                <form th:action="@{/admin/clients/edit/{id}(id=${client.id})}" 
                      method="post" 
                      class="p-6 space-y-6">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    
                    <!-- Company Information -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-900">Company Information</h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="companyName" class="block text-sm font-medium text-gray-700 mb-2">
                                    Company Name *
                                </label>
                                <input type="text" 
                                       id="companyName" 
                                       name="companyName" 
                                       th:value="${client.companyName}"
                                       required
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            
                            <div>
                                <label for="contactPerson" class="block text-sm font-medium text-gray-700 mb-2">
                                    Contact Person *
                                </label>
                                <input type="text" 
                                       id="contactPerson" 
                                       name="contactPerson" 
                                       th:value="${client.contactPerson}"
                                       required
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                                    Phone *
                                </label>
                                <input type="tel" 
                                       id="phone" 
                                       name="phone" 
                                       th:value="${client.phone}"
                                       required
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            
                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                                    Email
                                </label>
                                <input type="email" 
                                       id="email" 
                                       name="email" 
                                       th:value="${client.email}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Address Information -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-900">Address Information</h3>
                        
                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                                Address
                            </label>
                            <input type="text" 
                                   id="address" 
                                   name="address" 
                                   th:value="${client.address}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label for="city" class="block text-sm font-medium text-gray-700 mb-2">
                                    City
                                </label>
                                <input type="text" 
                                       id="city" 
                                       name="city" 
                                       th:value="${client.city}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            
                            <div>
                                <label for="country" class="block text-sm font-medium text-gray-700 mb-2">
                                    Country
                                </label>
                                <input type="text" 
                                       id="country" 
                                       name="country" 
                                       th:value="${client.country}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            
                            <div>
                                <label for="taxId" class="block text-sm font-medium text-gray-700 mb-2">
                                    Tax ID
                                </label>
                                <input type="text" 
                                       id="taxId" 
                                       name="taxId" 
                                       th:value="${client.taxId}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                        
                        <div>
                            <label for="companyId" class="block text-sm font-medium text-gray-700 mb-2">
                                Company ID (Registration Number)
                            </label>
                            <input type="text" 
                                   id="companyId" 
                                   name="companyId" 
                                   th:value="${client.companyId}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    
                    <!-- Additional Information -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-900">Additional Information</h3>
                        
                        <div>
                            <label for="notes" class="block text-sm font-medium text-gray-700 mb-2">
                                Notes
                            </label>
                            <textarea id="notes" 
                                      name="notes" 
                                      rows="4"
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                      th:text="${client.notes}"></textarea>
                        </div>
                        
                        <div class="flex items-center">
                            <input type="checkbox" 
                                   id="active" 
                                   name="active" 
                                   th:checked="${client.active}"
                                   class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="active" class="ml-2 block text-sm text-gray-900">
                                Client is active (can place new orders)
                            </label>
                        </div>
                    </div>
                    
                    <!-- Form Actions -->
                    <div class="pt-6 border-t border-gray-200">
                        <div class="flex justify-end space-x-3">
                            <a th:href="@{/admin/clients}" 
                               class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                                Cancel
                            </a>
                            <button type="submit" 
                                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                Update Client
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
            <!-- Client Statistics -->
            <div class="mt-6 bg-gray-50 rounded-xl border border-gray-200 p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Client Statistics</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-lg border border-gray-200">
                        <div class="text-sm text-gray-600">Total Orders</div>
                        <div class="text-2xl font-bold text-gray-900" th:text="${client.totalOrders}">0</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg border border-gray-200">
                        <div class="text-sm text-gray-600">Completed Orders</div>
                        <div class="text-2xl font-bold text-green-600" th:text="${client.completedOrders}">0</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg border border-gray-200">
                        <div class="text-sm text-gray-600">Pending Orders</div>
                        <div class="text-2xl font-bold text-yellow-600" th:text="${client.pendingOrders}">0</div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <a th:href="@{/admin/orders?clientId={id}(id=${client.id})}" 
                       class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                        View all orders for this client →
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
