<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.companies.create.title}">Add Company - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900" th:text="#{admin.companies.create.heading}">Add Company</h1>
                    <p class="text-gray-600 mt-2" th:text="#{admin.companies.create.subtitle}">Create a new tenant company</p>
                    <div class="mt-4 rounded-lg border border-sky-200 bg-sky-50 px-4 py-3">
                        <p id="companyFormSmartHint" class="text-xs text-sky-800" th:text="#{admin.companies.form.smart.initial}">
                            Start with legal/company identity, then billing details so invoices and email sender stay consistent.
                        </p>
                    </div>
                </div>
                <a th:href="@{/admin/companies}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
                   th:text="#{admin.companies.back_to_companies}">
                    ← Back to Companies
                </a>
            </div>
        </div>

        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900" th:text="#{admin.companies.form.section.company_info}">Company Information</h2>
                </div>

                <form th:action="@{/admin/companies/create}" th:object="${company}" method="post" class="p-6 space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div th:if="${errorMessage}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                        <span th:with="m=${#messages.msgOrNull(errorMessage)}"
                              th:text="${m != null ? m : errorMessage}">Error message</span>
                    </div>

                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.name_required}">Company Name *</span>
                        </label>
                        <input type="text"
                               id="name"
                               name="name"
                               th:field="*{name}"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.email_sender}">Company Email (sender)</span>
                        </label>
                        <input type="email"
                               id="email"
                               name="email"
                               th:field="*{email}"
                               th:placeholder="#{admin.companies.form.email_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.phone}">Company Phone</span>
                        </label>
                        <input type="text"
                               id="phone"
                               name="phone"
                               th:field="*{phone}"
                               th:placeholder="#{admin.companies.form.phone_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.address}">Company Address</span>
                        </label>
                        <input type="text"
                               id="address"
                               name="address"
                               th:field="*{address}"
                               th:placeholder="#{admin.companies.form.address_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="website" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.website}">Company Website</span>
                        </label>
                        <input type="text"
                               id="website"
                               name="website"
                               th:field="*{website}"
                               th:placeholder="#{admin.companies.form.website_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div class="border-t border-gray-200 pt-6">
                        <h3 class="text-sm font-semibold text-gray-900 mb-4" th:text="#{admin.companies.form.billing_profile}">Billing Profile</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="legalName" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.legal_name}">Legal name</span>
                                </label>
                                <input type="text"
                                       id="legalName"
                                       name="legalName"
                                       th:field="*{legalName}"
                                       th:placeholder="#{admin.companies.form.legal_name_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="billingEmail" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.billing_email}">Billing email</span>
                                </label>
                                <input type="email"
                                       id="billingEmail"
                                       name="billingEmail"
                                       th:field="*{billingEmail}"
                                       th:placeholder="#{admin.companies.form.billing_email_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="taxId" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.tax_id}">Tax ID / PIB</span>
                                </label>
                                <input type="text"
                                       id="taxId"
                                       name="taxId"
                                       th:field="*{taxId}"
                                       th:placeholder="#{admin.companies.form.tax_id_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="registrationNumber" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.registration_number}">Registration number</span>
                                </label>
                                <input type="text"
                                       id="registrationNumber"
                                       name="registrationNumber"
                                       th:field="*{registrationNumber}"
                                       th:placeholder="#{admin.companies.form.registration_number_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="bankName" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.bank_name}">Bank name</span>
                                </label>
                                <input type="text"
                                       id="bankName"
                                       name="bankName"
                                       th:field="*{bankName}"
                                       th:placeholder="#{admin.companies.form.bank_name_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <div>
                                <label for="bankAccount" class="block text-sm font-medium text-gray-700 mb-2">
                                    <span th:text="#{admin.companies.form.bank_account}">Bank account</span>
                                </label>
                                <input type="text"
                                       id="bankAccount"
                                       name="bankAccount"
                                       th:field="*{bankAccount}"
                                       th:placeholder="#{admin.companies.form.bank_account_placeholder}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="primaryColor" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.primary_color}">Primary Color</span>
                        </label>
                        <input type="text"
                               id="primaryColor"
                               name="primaryColor"
                               th:field="*{primaryColor}"
                               placeholder="#2563eb"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div class="flex items-center">
                                <input type="checkbox"
                               id="active"
                               name="active"
                               th:field="*{active}"
                               checked
                               class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="active" class="ml-2 block text-sm text-gray-900">
                            <span th:text="#{admin.companies.form.active}">Company is active</span>
                        </label>
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                            <a th:href="@{/admin/companies}"
                               class="w-full sm:w-auto px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-center"
                               th:text="#{common.cancel}">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="w-full sm:w-auto px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                    th:text="#{admin.companies.create.submit}">
                                Create Company
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script th:inline="javascript">
        (function () {
            const nameField = document.getElementById('name');
            const emailField = document.getElementById('email');
            const websiteField = document.getElementById('website');
            const legalNameField = document.getElementById('legalName');
            const billingEmailField = document.getElementById('billingEmail');
            const taxIdField = document.getElementById('taxId');
            const regField = document.getElementById('registrationNumber');
            const bankField = document.getElementById('bankAccount');
            const hint = document.getElementById('companyFormSmartHint');
            if (!hint) return;

            const i18n = {
                ready: /*[[#{admin.companies.form.smart.ready}]]*/ 'Company profile is ready for onboarding.',
                missingPrefix: /*[[#{admin.companies.form.smart.missing_prefix}]]*/ 'Recommended before saving:',
                missingName: /*[[#{admin.companies.form.smart.missing.name}]]*/ 'company name',
                suggestLegalName: /*[[#{admin.companies.form.smart.suggest.legal_name}]]*/ 'Add legal name for cleaner invoices and contracts.',
                suggestBillingEmail: /*[[#{admin.companies.form.smart.suggest.billing_email}]]*/ 'Add billing email to route invoices to finance contact.',
                suggestTaxId: /*[[#{admin.companies.form.smart.suggest.tax_id}]]*/ 'Add tax ID/PIB for accounting readiness.',
                suggestRegistration: /*[[#{admin.companies.form.smart.suggest.registration}]]*/ 'Add registration number for legal records.',
                suggestBank: /*[[#{admin.companies.form.smart.suggest.bank}]]*/ 'Add bank account for payment instructions.',
                warnSenderMismatch: /*[[#{admin.companies.form.smart.warn.sender_mismatch}]]*/ 'Sender email and billing email use different domains. Confirm this is intentional.',
                warnWebsiteFormat: /*[[#{admin.companies.form.smart.warn.website_format}]]*/ 'Website should start with http:// or https:// for clickable links.'
            };

            function domain(email) {
                const raw = (email || '').trim().toLowerCase();
                if (!raw.includes('@')) return '';
                return raw.split('@')[1] || '';
            }

            function updateHint() {
                const missing = [];
                const suggestions = [];
                const warnings = [];

                if (!nameField || nameField.value.trim().length < 2) missing.push(i18n.missingName);
                if (!legalNameField || legalNameField.value.trim().length < 2) suggestions.push(i18n.suggestLegalName);
                if (!billingEmailField || billingEmailField.value.trim().length < 5) suggestions.push(i18n.suggestBillingEmail);
                if (!taxIdField || taxIdField.value.trim().length < 6) suggestions.push(i18n.suggestTaxId);
                if (!regField || regField.value.trim().length < 4) suggestions.push(i18n.suggestRegistration);
                if (!bankField || bankField.value.trim().length < 6) suggestions.push(i18n.suggestBank);

                const senderDomain = domain(emailField ? emailField.value : '');
                const billingDomain = domain(billingEmailField ? billingEmailField.value : '');
                if (senderDomain && billingDomain && senderDomain !== billingDomain) warnings.push(i18n.warnSenderMismatch);

                const website = (websiteField ? websiteField.value : '').trim();
                if (website && !/^https?:\/\//i.test(website)) warnings.push(i18n.warnWebsiteFormat);

                if (missing.length === 0 && suggestions.length === 0 && warnings.length === 0) {
                    hint.textContent = i18n.ready;
                    return;
                }

                const parts = [];
                if (missing.length > 0) parts.push(i18n.missingPrefix + ' ' + missing.join(', ') + '.');
                if (suggestions.length > 0) parts.push(suggestions.slice(0, 2).join(' '));
                if (warnings.length > 0) parts.push(warnings.join(' '));
                hint.textContent = parts.join(' ');
            }

            [nameField, emailField, websiteField, legalNameField, billingEmailField, taxIdField, regField, bankField].forEach(el => {
                if (!el) return;
                el.addEventListener('input', updateHint);
                el.addEventListener('change', updateHint);
            });
            updateHint();
        })();
    </script>
</body>
</html>
