<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.companies.create.title}">Add Company - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900" th:text="#{admin.companies.create.heading}">Add Company</h1>
                    <p class="text-gray-600 mt-2" th:text="#{admin.companies.create.subtitle}">Create a new tenant company</p>
                </div>
                <a th:href="@{/admin/companies}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
                   th:text="#{admin.companies.back_to_companies}">
                    ← Back to Companies
                </a>
            </div>
        </div>

        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900" th:text="#{admin.companies.form.section.company_info}">Company Information</h2>
                </div>

                <form th:action="@{/admin/companies/create}" th:object="${company}" method="post" class="p-6 space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div th:if="${errorMessage}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                        <span th:text="${errorMessage}">Error message</span>
                    </div>

                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.name_required}">Company Name *</span>
                        </label>
                        <input type="text"
                               id="name"
                               name="name"
                               th:field="*{name}"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.email_sender}">Company Email (sender)</span>
                        </label>
                        <input type="email"
                               id="email"
                               name="email"
                               th:field="*{email}"
                               th:placeholder="#{admin.companies.form.email_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.phone}">Company Phone</span>
                        </label>
                        <input type="text"
                               id="phone"
                               name="phone"
                               th:field="*{phone}"
                               th:placeholder="#{admin.companies.form.phone_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.address}">Company Address</span>
                        </label>
                        <input type="text"
                               id="address"
                               name="address"
                               th:field="*{address}"
                               th:placeholder="#{admin.companies.form.address_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="website" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.website}">Company Website</span>
                        </label>
                        <input type="text"
                               id="website"
                               name="website"
                               th:field="*{website}"
                               th:placeholder="#{admin.companies.form.website_placeholder}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="primaryColor" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.companies.form.primary_color}">Primary Color</span>
                        </label>
                        <input type="text"
                               id="primaryColor"
                               name="primaryColor"
                               th:field="*{primaryColor}"
                               placeholder="#2563eb"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div class="flex items-center">
                                <input type="checkbox"
                               id="active"
                               name="active"
                               th:field="*{active}"
                               checked
                               class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="active" class="ml-2 block text-sm text-gray-900">
                            <span th:text="#{admin.companies.form.active}">Company is active</span>
                        </label>
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <div class="flex justify-end space-x-3">
                            <a th:href="@{/admin/companies}"
                               class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
                               th:text="#{common.cancel}">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                    th:text="#{admin.companies.create.submit}">
                                Create Company
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
