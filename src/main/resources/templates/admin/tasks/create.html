<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:lang="${#locale.language}">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{tasks.create.page_title}">Create Task - PrintFlow Admin</title>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="container mx-auto px-4 py-8">
    <div class="mb-8">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900" th:text="#{tasks.create.title}">
                    Create Task
                </h1>
                <p class="text-gray-600 mt-2" th:text="#{tasks.create.subtitle}">
                    Create and assign a task
                </p>
                <div class="mt-4 rounded-lg border border-blue-200 bg-blue-50 px-4 py-3">
                    <h2 class="text-sm font-semibold text-blue-900" th:text="#{tasks.create.smart.title}">Smart task helper</h2>
                    <p id="taskSmartHint" class="mt-1 text-xs text-blue-800" th:text="#{tasks.create.smart.initial}">
                        Add title, owner, due date and a clear description to reduce back-and-forth.
                    </p>
                </div>
            </div>
            <a th:href="@{/admin/tasks}"
               class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
               th:text="#{tasks.create.back}">
                ← Back to Tasks
            </a>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900" th:text="#{tasks.create.form.title}">
                    Task Details
                </h2>
            </div>

            <form th:action="@{/admin/tasks/create}" th:object="${task}" method="post" class="p-6 space-y-6">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:if="${errorMessage}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                    <span th:with="m=${#messages.msgOrNull(errorMessage)}"
                          th:text="${m != null ? m : errorMessage}">Error creating task.</span>
                </div>
                <div th:if="${#fields.hasAnyErrors()}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                    <ul class="list-disc pl-5">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err.defaultMessage}"></li>
                    </ul>
                </div>

                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-2"
                           th:text="#{tasks.create.field.title}">
                        Title *
                    </label>
                    <input type="text"
                           id="title"
                           name="title"
                           th:field="*{title}"
                           th:placeholder="#{tasks.create.field.title.placeholder}"
                           required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2"
                           th:text="#{tasks.create.field.description}">
                        Description
                    </label>
                    <textarea id="description"
                              name="description"
                              th:field="*{description}"
                              rows="4"
                              th:placeholder="#{tasks.create.field.description.placeholder}"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                    <p class="mt-1 text-xs text-gray-500" th:text="#{tasks.create.field.description.hint}">
                        Include what to do, print specs, and expected outcome.
                    </p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label for="priority" class="block text-sm font-medium text-gray-700 mb-2"
                               th:text="#{tasks.create.field.priority}">
                            Priority
                        </label>
                        <select id="priority"
                                name="priority"
                                th:field="*{priority}"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="" th:text="#{tasks.create.priority.select}"></option>
                            <option th:each="p : ${priorities}"
        th:value="${p.name()}"
        th:text="${#messages.msg('tasks.priority.' + p.name())}">
</option>

                        </select>
                    </div>

                    <div>
                        <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-2"
                               th:text="#{tasks.create.field.due_date}">
                            Due Date
                        </label>
                        <input type="datetime-local"
                               id="dueDate"
                               name="dueDate"
                               th:field="*{dueDate}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="estimatedHours" class="block text-sm font-medium text-gray-700 mb-2"
                               th:text="#{tasks.create.field.estimated_hours}">
                            Estimated Hours
                        </label>
                        <input type="number"
                               step="0.5"
                               min="0"
                               id="estimatedHours"
                               name="estimatedHours"
                               th:field="*{estimatedHours}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="workOrderId" class="block text-sm font-medium text-gray-700 mb-2"
                               th:text="#{tasks.create.field.work_order}">
                            Work Order
                        </label>
                        <select id="workOrderId"
                                name="workOrderId"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="" th:text="#{tasks.create.work_order.none}">No order</option>
                            <option th:each="order : ${orders}"
                                    th:value="${order.id}"
                                    th:attr="data-print-type=${order.printTypeSafe},data-status=${order.status != null ? order.status.name() : ''}"
                                    th:text="${order.orderNumber + ' - ' + order.title}"
                                    th:selected="${selectedWorkOrderId != null && selectedWorkOrderId == order.id}"></option>
                        </select>
                    </div>

                    <div>
                        <label for="assignedToId" class="block text-sm font-medium text-gray-700 mb-2"
                               th:text="#{tasks.create.field.assign_to}">
                            Assign To Team Member
                        </label>
                        <select id="assignedToId"
                                name="assignedToId"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="" th:text="#{tasks.create.assign.unassigned}">Unassigned</option>
                            <option th:if="${#lists.isEmpty(workers)}" value="" disabled th:text="#{tasks.create.assign.no_workers}">-- No team members available --</option>
                            <option th:each="worker : ${workers}"
                                    th:value="${worker.id}"
                                    th:attr="data-role=${worker.role},data-available=${worker.available}"
                                    th:selected="${selectedAssignedToId != null && selectedAssignedToId == worker.id}"
                                    th:text="${worker.fullName + ' (' + (#messages.msgOrNull('users.role.' + worker.role) != null ? #messages.msg('users.role.' + worker.role) : worker.role) + ')' + (worker.available ? '' : ' (' + #messages.msg('workers.busy') + ')')}"></option>
                        </select>
                        <p th:if="${suggestedWorkerName != null}" class="mt-2 text-xs text-blue-700">
                            <span th:text="#{tasks.create.assign.suggested}">Suggested assignment:</span> <span th:text="${suggestedWorkerName}">Team member</span>
                        </p>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200">
                    <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
                        <a th:href="@{/admin/tasks}"
                           class="w-full sm:w-auto px-6 py-2 border border-gray-300 rounded-lg text-center text-gray-700 hover:bg-gray-50"
                           th:text="#{common.cancel}">
                            Cancel
                        </a>
                        <button type="submit"
                                class="w-full sm:w-auto px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                th:text="#{tasks.create.action.create}">
                            Create Task
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>
<script th:inline="javascript">
    (function () {
        const orderSelect = document.getElementById('workOrderId');
        const workerSelect = document.getElementById('assignedToId');
        const titleInput = document.getElementById('title');
        const descriptionInput = document.getElementById('description');
        const dueDateInput = document.getElementById('dueDate');
        const estimatedHoursInput = document.getElementById('estimatedHours');
        const hintEl = document.getElementById('taskSmartHint');
        if (!orderSelect || !workerSelect) return;

        const i18n = {
            initial: /*[[#{tasks.create.smart.initial}]]*/ 'Add title, owner, due date and a clear description to reduce back-and-forth.',
            ready: /*[[#{tasks.create.smart.ready}]]*/ 'Task is ready to assign.',
            missingPrefix: /*[[#{tasks.create.smart.missing_prefix}]]*/ 'Recommended before saving:',
            missingTitle: /*[[#{tasks.create.smart.missing.title}]]*/ 'title',
            missingAssignee: /*[[#{tasks.create.smart.missing.assignee}]]*/ 'assignee',
            missingDueDate: /*[[#{tasks.create.smart.missing.due_date}]]*/ 'due date',
            missingDescription: /*[[#{tasks.create.smart.missing.description}]]*/ 'clear description',
            warnNoHours: /*[[#{tasks.create.smart.warn.no_hours}]]*/ 'Estimated hours are not set. Add estimate for better planning.',
            warnOverdueDate: /*[[#{tasks.create.smart.warn.past_due}]]*/ 'Due date is in the past. Please pick a future date.'
        };

        function desiredRole(status, printType) {
            if (status === 'IN_DESIGN' || status === 'WAITING_CLIENT_APPROVAL') return 'WORKER_DESIGN';
            if (status === 'APPROVED_FOR_PRINT' || status === 'IN_PRINT' || status === 'WAITING_QUALITY_CHECK') return 'WORKER_PRINT';
            if (printType === 'DTF' || printType === 'LASER') return 'WORKER_PRINT';
            return 'WORKER_GENERAL';
        }

        function pickWorker(role) {
            const options = Array.from(workerSelect.options).filter(o => o.value);
            const preferredAvailable = options.find(o => o.dataset.role === role && o.dataset.available === 'true');
            if (preferredAvailable) return preferredAvailable.value;
            const preferredAny = options.find(o => o.dataset.role === role);
            if (preferredAny) return preferredAny.value;
            const anyAvailable = options.find(o => o.dataset.available === 'true');
            if (anyAvailable) return anyAvailable.value;
            return options.length ? options[0].value : '';
        }

        function autoSuggest() {
            const selectedOrder = orderSelect.options[orderSelect.selectedIndex];
            if (!selectedOrder || !selectedOrder.value) return;
            if (workerSelect.value) return;
            const role = desiredRole(selectedOrder.dataset.status || '', selectedOrder.dataset.printType || '');
            const candidate = pickWorker(role);
            if (candidate) workerSelect.value = candidate;
        }

        function updateSmartHint() {
            if (!hintEl) return;
            const missing = [];
            if (!titleInput || titleInput.value.trim().length < 3) missing.push(i18n.missingTitle);
            if (!workerSelect || !workerSelect.value) missing.push(i18n.missingAssignee);
            if (!dueDateInput || !dueDateInput.value) missing.push(i18n.missingDueDate);
            if (!descriptionInput || descriptionInput.value.trim().length < 20) missing.push(i18n.missingDescription);

            const warnings = [];
            const hours = estimatedHoursInput ? Number(estimatedHoursInput.value || 0) : 0;
            if (!Number.isNaN(hours) && hours <= 0) warnings.push(i18n.warnNoHours);
            if (dueDateInput && dueDateInput.value) {
                const due = new Date(dueDateInput.value);
                if (!Number.isNaN(due.getTime()) && due.getTime() < Date.now()) warnings.push(i18n.warnOverdueDate);
            }

            if (missing.length === 0 && warnings.length === 0) {
                hintEl.textContent = i18n.ready;
                return;
            }

            const parts = [];
            if (missing.length > 0) {
                parts.push(i18n.missingPrefix + ' ' + missing.join(', ') + '.');
            }
            if (warnings.length > 0) {
                parts.push(warnings.join(' '));
            }
            hintEl.textContent = parts.join(' ');
        }

        orderSelect.addEventListener('change', autoSuggest);
        [titleInput, descriptionInput, dueDateInput, estimatedHoursInput, workerSelect].forEach(el => {
            if (!el) return;
            el.addEventListener('input', updateSmartHint);
            el.addEventListener('change', updateSmartHint);
        });
        autoSuggest();
        updateSmartHint();
    })();
</script>
</body>
</html>
