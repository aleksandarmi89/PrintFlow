<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{admin.tasks.edit.title}">Edit Task - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div th:if="${successMessage}" class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700">
            <span th:with="m=${#messages.msgOrNull(successMessage)}"
                  th:text="${m != null ? m : successMessage}">Success</span>
        </div>
        <div th:if="${errorMessage}" class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700">
            <span th:with="m=${#messages.msgOrNull(errorMessage)}"
                  th:text="${m != null ? m : errorMessage}">Error</span>
        </div>
        <div class="mb-8">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900" th:text="#{admin.tasks.edit.heading}">Edit Task</h1>
                    <p class="text-gray-600 mt-2" th:text="#{admin.tasks.edit.subtitle}">Update task details</p>
                </div>
                <a th:href="@{/admin/tasks/{id}(id=${task.id})}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
                   th:text="#{admin.tasks.edit.back_to_task}">
                    ← Back to Task
                </a>
            </div>
        </div>

        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900" th:text="#{admin.tasks.edit.section.task_details}">Task Details</h2>
                </div>

                <form th:action="@{/admin/tasks/edit/{id}(id=${task.id})}" th:object="${task}" method="post" class="p-6 space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div th:if="${#fields.hasAnyErrors()}" class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                        <ul class="list-disc pl-5">
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err.defaultMessage}"></li>
                        </ul>
                    </div>
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{admin.tasks.edit.field.title_required}">Title *</span>
                        </label>
                        <input type="text"
                               id="title"
                               name="title"
                               th:field="*{title}"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                            <span th:text="#{common.description}">Description</span>
                        </label>
                        <textarea id="description"
                                  name="description"
                                  th:field="*{description}"
                                  rows="4"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="priority" class="block text-sm font-medium text-gray-700 mb-2">
                                <span th:text="#{admin.tasks.edit.field.priority}">Priority</span>
                            </label>
                            <select id="priority"
                                    name="priority"
                                    th:field="*{priority}"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option th:each="p : ${priorities}"
                                        th:value="${p.name()}"
                                        th:text="${#messages.msgOrNull('tasks.priority.' + p.name()) != null ? #messages.msg('tasks.priority.' + p.name()) : p.name()}"></option>
                            </select>
                        </div>

                        <div>
                            <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-2">
                                <span th:text="#{admin.tasks.edit.field.due_date}">Due Date</span>
                            </label>
                            <input type="datetime-local"
                                   id="dueDate"
                                   name="dueDate"
                                   th:field="*{dueDate}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div>
                            <label for="estimatedHours" class="block text-sm font-medium text-gray-700 mb-2">
                                <span th:text="#{admin.tasks.edit.field.estimated_hours}">Estimated Hours</span>
                            </label>
                            <input type="number"
                                   step="0.5"
                                   min="0"
                                   id="estimatedHours"
                                   name="estimatedHours"
                                   th:field="*{estimatedHours}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="assignedToId" class="block text-sm font-medium text-gray-700 mb-2">
                                <span th:text="#{admin.tasks.edit.field.assign_to}">Assign To</span>
                            </label>
                            <select id="assignedToId"
                                    name="assignedToId"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="" th:text="#{admin.tasks.edit.field.unassigned}">Unassigned</option>
                                <option th:each="worker : ${workers}"
                                        th:value="${worker.id}"
                                        th:text="${worker.fullName + ' (' + (#messages.msgOrNull('users.role.' + worker.role) != null ? #messages.msg('users.role.' + worker.role) : worker.role) + ')'}"
                                        th:selected="${task.assignedToId == worker.id}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-200">
                        <div class="flex justify-end space-x-3">
                            <a th:href="@{/admin/tasks/{id}(id=${task.id})}"
                               class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
                               th:text="#{common.cancel}">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                    th:text="#{admin.tasks.edit.submit}">
                                Save Changes
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
