<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title th:text="#{orders.edit.page_title}">Edit Order - PrintFlow Admin</title>
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container mx-auto px-4 py-8">
        <div th:if="${billingExpired}" class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700">
            <span th:with="m=${#messages.msgOrNull(billingLockMessageKey)}"
                  th:text="${m != null ? m : (#messages.msgOrNull('billing.lock.expired') != null ? #messages.msg('billing.lock.expired') : 'Premium features are locked. Please upgrade.')}">Premium features are locked. Please upgrade.</span>
            <a class="ml-2 underline" th:href="@{/admin/billing}" th:text="#{billing.notice.cta}">Manage billing</a>
        </div>
        <div th:if="${successMessage}" class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700">
            <span th:with="m=${#messages.msgOrNull(successMessage)}"
                  th:text="${m != null ? m : successMessage}">Success</span>
        </div>
        <div th:if="${errorMessage}" class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700">
            <span th:with="m=${#messages.msgOrNull(errorMessage)}"
                  th:text="${m != null ? m : errorMessage}">Error</span>
        </div>
        <div class="mb-6">
            <a th:href="@{/admin/orders/{id}(id=${order.id})}"
               class="text-sm text-blue-600 hover:text-blue-800" th:text="#{orders.edit.back_to_order}">← Back to order</a>
            <h1 class="text-2xl font-bold text-gray-900 mt-2" th:text="#{orders.edit.title}">Edit Order</h1>
        </div>

        <form th:action="@{/admin/orders/{id}/edit(id=${order.id})}" th:object="${order}" method="post"
              class="bg-white rounded-xl border border-gray-200 p-6 space-y-6">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="rounded-lg border border-blue-200 bg-blue-50 px-4 py-3">
                <h2 class="text-sm font-semibold text-blue-900" th:text="#{orders.edit.smart.title}">Smart edit helper</h2>
                <p id="orderEditSmartHint" class="mt-1 text-xs text-blue-800" th:text="#{orders.edit.smart.initial}">
                    Keep deadline, price, and description updated so production and billing stay aligned.
                </p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.edit.field_title}">Title</label>
                    <input id="title" th:field="*{title}" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{clients.title}">Client</label>
                    <select name="clientId" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.companyName}"
                                th:selected="${order.clientId == c.id}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{common.status}">Status</label>
                    <select th:field="*{status}" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option th:each="s : ${orderStatuses}" th:value="${s}" th:text="#{${s.messageKey}}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.details.print_type}">Print Type</label>
                    <select th:field="*{printType}" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="DTF" th:text="#{print.type.DTF}">DTF</option>
                        <option value="LASER" th:text="#{print.type.LASER}">Laser</option>
                        <option value="OTHER" th:text="#{print.type.OTHER}">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.assigned_to}">Assigned To</label>
                    <select name="assignedToId" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="" th:text="#{orders.details.unassigned}">-- Unassigned --</option>
                        <option th:each="w : ${workers}" th:value="${w.id}"
                                th:text="${w.fullName + ' (' + (#messages.msgOrNull('users.role.' + w.role) != null ? #messages.msg('users.role.' + w.role) : w.role) + ') • ' + (w.available ? #messages.msg('workers.available') : #messages.msg('workers.busy'))}"
                                th:selected="${order.assignedToId == w.id}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.deadline}">Deadline</label>
                    <input id="deadline" th:field="*{deadline}" type="datetime-local"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1"
                           th:text="#{orders.edit.price_label(${companyCurrency})}">Price (RSD)</label>
                    <input id="price" th:field="*{price}" type="number" step="0.01"
                           th:placeholder="#{orders.amount_placeholder(${companyCurrency})}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <p class="mt-1 text-xs text-gray-500" th:text="#{orders.amount_hint(${companyCurrency})}">Enter amount in RSD (e.g., 1,200.00)</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1"
                           th:text="#{orders.edit.cost_label(${companyCurrency})}">Cost (RSD)</label>
                    <input id="cost" th:field="*{cost}" type="number" step="0.01"
                           th:placeholder="#{orders.amount_placeholder(${companyCurrency})}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <p class="mt-1 text-xs text-gray-500" th:text="#{orders.amount_hint(${companyCurrency})}">Enter amount in RSD (e.g., 1,200.00)</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.edit.paid}">Paid</label>
                    <select id="paid" th:field="*{paid}" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option th:value="true" th:text="#{common.yes}">Yes</option>
                        <option th:value="false" th:text="#{common.no}">No</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="mb-1 flex items-center justify-between gap-2">
                    <label class="block text-sm font-medium text-gray-700" th:text="#{orders.details.description}">Description</label>
                    <button id="insertEditBriefTemplate"
                            type="button"
                            class="text-xs rounded border border-gray-300 px-2 py-1 text-gray-700 hover:bg-gray-50"
                            th:text="#{orders.edit.smart.brief_template_cta}">
                        Insert brief template
                    </button>
                </div>
                <textarea id="description" th:field="*{description}" rows="4"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
                <p id="orderEditBriefHint" class="mt-1 text-xs text-blue-700"></p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.details.specifications}">Specifications</label>
                <textarea th:field="*{specifications}" rows="3"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" th:text="#{orders.details.internal_notes}">Internal Notes</label>
                <textarea th:field="*{internalNotes}" rows="3"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
            </div>

            <div class="flex justify-end gap-3">
                <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50" th:text="#{common.cancel}">Cancel</a>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    <span th:text="#{orders.edit.save_changes}">Save changes</span>
                </button>
            </div>
        </form>
    </main>
    <script th:inline="javascript">
        (function () {
            const hintEl = document.getElementById('orderEditSmartHint');
            const titleEl = document.getElementById('title');
            const descriptionEl = document.getElementById('description');
            const deadlineEl = document.getElementById('deadline');
            const priceEl = document.getElementById('price');
            const costEl = document.getElementById('cost');
            const paidEl = document.getElementById('paid');
            const briefHintEl = document.getElementById('orderEditBriefHint');
            const insertBriefBtn = document.getElementById('insertEditBriefTemplate');
            if (!hintEl) return;

            const i18n = {
                ready: /*[[#{orders.edit.smart.ready}]]*/ 'Order looks consistent.',
                missingPrefix: /*[[#{orders.edit.smart.missing_prefix}]]*/ 'Before saving, consider adding:',
                missingDeadline: /*[[#{orders.edit.smart.missing.deadline}]]*/ 'deadline',
                missingDescription: /*[[#{orders.edit.smart.missing.description}]]*/ 'clear description',
                warnPriceCost: /*[[#{orders.edit.smart.warn.price_below_cost}]]*/ 'Price is below cost. This order may be unprofitable.',
                warnPaidNoPrice: /*[[#{orders.edit.smart.warn.paid_without_price}]]*/ 'Order is marked as paid, but price is empty.',
                briefTemplateCta: /*[[#{orders.edit.smart.brief_template_cta}]]*/ 'Insert brief template',
                briefTemplate: /*[[#{orders.edit.smart.brief_template}]]*/ 'Product:\nDimensions:\nMaterial:\nFinishing:\nQuantity:\nDeadline:\nDelivery note:',
                briefHintEmpty: /*[[#{orders.edit.smart.brief_hint_empty}]]*/ 'Use the brief template for consistent production handoff.',
                briefHintPartial: /*[[#{orders.edit.smart.brief_hint_partial}]]*/ 'Description can be clearer: add dimensions, material, finishing, and deadline.',
                briefHintReady: /*[[#{orders.edit.smart.brief_hint_ready}]]*/ 'Brief coverage looks good for execution.'
            };

            function updateHint() {
                const missing = [];
                const warnings = [];

                const title = titleEl ? titleEl.value.trim() : '';
                const description = descriptionEl ? descriptionEl.value.trim() : '';
                const hasDeadline = deadlineEl && deadlineEl.value;
                const price = priceEl ? Number(priceEl.value) : NaN;
                const cost = costEl ? Number(costEl.value) : NaN;
                const paid = paidEl ? paidEl.value === 'true' : false;

                if (title.length >= 3 && description.length < 20) {
                    missing.push(i18n.missingDescription);
                }
                if (!hasDeadline) {
                    missing.push(i18n.missingDeadline);
                }
                if (!Number.isNaN(price) && !Number.isNaN(cost) && price > 0 && cost > 0 && price < cost) {
                    warnings.push(i18n.warnPriceCost);
                }
                if (paid && (Number.isNaN(price) || price <= 0)) {
                    warnings.push(i18n.warnPaidNoPrice);
                }

                if (missing.length === 0 && warnings.length === 0) {
                    hintEl.textContent = i18n.ready;
                } else {
                    const parts = [];
                    if (missing.length > 0) parts.push(i18n.missingPrefix + ' ' + missing.join(', ') + '.');
                    if (warnings.length > 0) parts.push(warnings.join(' '));
                    hintEl.textContent = parts.join(' ');
                }

                if (briefHintEl) {
                    const descText = description.toLowerCase();
                    if (!descText) {
                        briefHintEl.textContent = i18n.briefHintEmpty;
                    } else {
                        const hasDims = descText.includes('mm') || descText.includes('cm') || descText.includes('x');
                        const hasMaterial = descText.includes('paper') || descText.includes('papir') || descText.includes('material');
                        const hasFinishing = descText.includes('lamination') || descText.includes('plast') || descText.includes('finish') || descText.includes('dorad');
                        const hasDeadlineInfo = descText.includes('deadline') || descText.includes('rok') || descText.includes('isporuk');
                        const completedParts = [hasDims, hasMaterial, hasFinishing, hasDeadlineInfo].filter(Boolean).length;
                        briefHintEl.textContent = completedParts >= 3 ? i18n.briefHintReady : i18n.briefHintPartial;
                    }
                }
            }

            [titleEl, descriptionEl, deadlineEl, priceEl, costEl, paidEl].forEach(el => {
                if (!el) return;
                el.addEventListener('input', updateHint);
                el.addEventListener('change', updateHint);
            });
            if (insertBriefBtn && descriptionEl) {
                insertBriefBtn.addEventListener('click', function () {
                    if (descriptionEl.value && descriptionEl.value.trim().length > 0) {
                        descriptionEl.value += '\n\n' + i18n.briefTemplate;
                    } else {
                        descriptionEl.value = i18n.briefTemplate;
                    }
                    descriptionEl.focus();
                    updateHint();
                });
            }
            updateHint();
        })();
    </script>
</body>
</html>
