app:
  mail:
    require-crypt-key: true
  seed:
    enabled: false
    sample:
      enabled: false
      reset: false
      force: false
  upload:
    public-max-total-size: 209715200  # 200MB in prod
  notification:
    email:
      enabled: ${APP_EMAIL_ENABLED:true}
      from: ${APP_EMAIL_FROM:no-reply@printflow.local}
      fallback-enabled: ${APP_EMAIL_FALLBACK:false}
  security:
    cors:
      enabled: ${APP_CORS_ENABLED:false}
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    hsts:
      enabled: true

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: Lax
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:mysql://localhost:3306/printflow_db?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&zeroDateTimeBehavior=CONVERT_TO_NULL
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
  flyway:
    enabled: true

stripe:
  mode: ${STRIPE_MODE:live}
  api-key: ${STRIPE_API_KEY:}
  live-api-key: ${STRIPE_LIVE_API_KEY:}
  test-api-key: ${STRIPE_TEST_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  live-webhook-secret: ${STRIPE_LIVE_WEBHOOK_SECRET:}
  test-webhook-secret: ${STRIPE_TEST_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:https://example.com/billing/success}
  cancel-url: ${STRIPE_CANCEL_URL:https://example.com/billing/cancel}
